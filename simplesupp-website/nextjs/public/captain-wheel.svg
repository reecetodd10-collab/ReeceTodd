<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#18181b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" stroke="url(#wheelGrad)" stroke-width="18" fill="none" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" stroke="url(#wheelGrad)" stroke-width="8" fill="none"/>
  <!-- Inner hub -->
  <circle cx="256" cy="256" r="45" stroke="url(#wheelGrad)" stroke-width="8" fill="none"/>
  <circle cx="256" cy="256" r="18" fill="url(#wheelGrad)"/>
  <!-- Spokes - 8 directions -->
  <line x1="256" y1="211" x2="256" y2="96" stroke="url(#wheelGrad)" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="301" x2="256" y2="416" stroke="url(#wheelGrad)" stroke-width="10" stroke-linecap="round"/>
  <line x1="211" y1="256" x2="96" y2="256" stroke="url(#wheelGrad)" stroke-width="10" stroke-linecap="round"/>
  <line x1="301" y1="256" x2="416" y2="256" stroke="url(#wheelGrad)" stroke-width="10" stroke-linecap="round"/>
  <!-- Diagonal spokes -->
  <line x1="224" y1="224" x2="143" y2="143" stroke="url(#wheelGrad)" stroke-width="8" stroke-linecap="round"/>
  <line x1="288" y1="288" x2="369" y2="369" stroke="url(#wheelGrad)" stroke-width="8" stroke-linecap="round"/>
  <line x1="288" y1="224" x2="369" y2="143" stroke="url(#wheelGrad)" stroke-width="8" stroke-linecap="round"/>
  <line x1="224" y1="288" x2="143" y2="369" stroke="url(#wheelGrad)" stroke-width="8" stroke-linecap="round"/>
  <!-- Handle pegs on outer ring -->
  <circle cx="256" cy="96" r="16" fill="url(#wheelGrad)"/>
  <circle cx="256" cy="416" r="16" fill="url(#wheelGrad)"/>
  <circle cx="96" cy="256" r="16" fill="url(#wheelGrad)"/>
  <circle cx="416" cy="256" r="16" fill="url(#wheelGrad)"/>
  <circle cx="143" cy="143" r="13" fill="url(#wheelGrad)"/>
  <circle cx="369" cy="369" r="13" fill="url(#wheelGrad)"/>
  <circle cx="369" cy="143" r="13" fill="url(#wheelGrad)"/>
  <circle cx="143" cy="369" r="13" fill="url(#wheelGrad)"/>
</svg>
