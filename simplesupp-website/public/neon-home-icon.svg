<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glowing Effect Filter -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Black Circle Background -->
  <circle cx="256" cy="256" r="240" fill="black" />

  <!-- Cyan Border with Glow -->
  <circle cx="256" cy="256" r="230" stroke="#00D9FF" stroke-width="20" filter="url(#glow)" />
  
  <!-- House Icon -->
  <path d="M256 120 L120 240 V380 H220 V300 H292 V380 H392 V240 L256 120 Z" 
        stroke="#00D9FF" 
        stroke-width="25" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
</svg>
